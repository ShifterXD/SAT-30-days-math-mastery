  <g font-family="Arial, Helvetica, sans-serif"><text x="58" y="150" font-size="26" font-weight="700" fill="#172033">Question 19</text><text x="58" y="190" font-size="24" font-weight="500" fill="#172033">For y=mx+b, if m=0 and b=-9, what is true?</text><text x="58" y="248" font-size="24" font-weight="500" fill="#172033">A) The line is vertical</text><text x="58" y="288" font-size="24" font-weight="500" fill="#172033">B) The line is horizontal</text><text x="58" y="328" font-size="24" font-weight="500" fill="#172033">C) The slope is undefined</text><text x="58" y="368" font-size="24" font-weight="500" fill="#172033">D) The y-intercept is 0</text></g>
