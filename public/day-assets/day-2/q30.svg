  <g font-family="Arial, Helvetica, sans-serif"><text x="58" y="150" font-size="26" font-weight="700" fill="#172033">Question 30</text><text x="58" y="190" font-size="24" font-weight="500" fill="#172033">Which equation represents a line with y-intercept -6?</text><text x="58" y="248" font-size="24" font-weight="500" fill="#172033">A) y=5x-6</text><text x="58" y="288" font-size="24" font-weight="500" fill="#172033">B) y=-6x+5</text><text x="58" y="328" font-size="24" font-weight="500" fill="#172033">C) y=6x+5</text><text x="58" y="368" font-size="24" font-weight="500" fill="#172033">D) y=5x+6</text></g>
