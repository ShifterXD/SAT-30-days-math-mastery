  <g font-family="Arial, Helvetica, sans-serif"><text x="58" y="150" font-size="26" font-weight="700" fill="#172033">Question 27</text><text x="58" y="190" font-size="24" font-weight="500" fill="#172033"><tspan x="58" dy="0">A gym membership costs $30 to join plus $12 per month. Which equation</tspan><tspan x="58" dy="32">gives total cost C after m months?</tspan></text><text x="58" y="248" font-size="24" font-weight="500" fill="#172033">A) C=30m+12</text><text x="58" y="288" font-size="24" font-weight="500" fill="#172033">B) C=12m+30</text><text x="58" y="328" font-size="24" font-weight="500" fill="#172033">C) C=42m</text><text x="58" y="368" font-size="24" font-weight="500" fill="#172033">D) C=30m-12</text></g>
</svg>