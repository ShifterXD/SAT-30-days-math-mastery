  <g font-family="Arial, Helvetica, sans-serif"><text x="58" y="150" font-size="26" font-weight="700" fill="#172033">Question 12</text><text x="58" y="190" font-size="24" font-weight="500" fill="#172033">A linear function has rate of change 6 and f(2)=20. Which equation defines f?</text><text x="58" y="248" font-size="24" font-weight="500" fill="#172033">A) f(x)=6x+8</text><text x="58" y="288" font-size="24" font-weight="500" fill="#172033">B) f(x)=6x+20</text><text x="58" y="328" font-size="24" font-weight="500" fill="#172033">C) f(x)=8x+6</text><text x="58" y="368" font-size="24" font-weight="500" fill="#172033">D) f(x)=20x+6</text></g>
